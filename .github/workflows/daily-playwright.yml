name: 每日自动打开MJTD（带浏览器缓存）
on:
  schedule:
    - cron: '0 4 * * *'   # 北京时间 12:00
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Playwright 浏览器
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-pw-chromium-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pw-chromium-

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install playwright

      - name: 安装 Chromium（缓存命中则跳过）
        run: |
          python -m playwright install chromium
          # 只装 chromium，不装 firefox/webkit，省空间和时间

      - name: 运行脚本（停留5秒）
        env:
          MJTD_COOKIES: ${{ secrets.MJTD_COOKIES }}
        run: python browser.py
