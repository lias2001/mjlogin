name: 每日5点自动打开MJTD
on:
  schedule:
    - cron: '0 21 * * *'   # UTC 21:00 = 北京时间 05:00
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 缓存 Playwright 浏览器
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-pw-chromium

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: 运行脚本
        env:
          MJTD_COOKIES: ${{ secrets.MJTD_COOKIES }}
        run: python browser.py
